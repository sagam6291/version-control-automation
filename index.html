<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif);}
.root{min-height:520px;background:var(--color-background-tertiary);display:flex;align-items:center;justify-content:center;padding:24px;position:relative;border-radius:var(--border-radius-lg);}
.screen{display:none;width:100%;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}
.topbar{position:absolute;top:16px;left:16px;display:flex;align-items:center;gap:8px;cursor:pointer;z-index:10;}
.mark{width:30px;height:30px;background:#534AB7;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.mark svg{width:16px;height:16px;}
.wordmark{font-size:13px;font-weight:500;color:var(--color-text-primary);}
#cover{align-items:flex-start;max-width:520px;margin:auto;}
.cover-inner{padding:40px 0 8px;}
.cover-eyebrow{font-size:12px;color:var(--color-text-secondary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
.cover-title{font-size:clamp(32px,6vw,52px);font-weight:500;color:var(--color-text-primary);line-height:1.1;margin-bottom:32px;}
.btn-start{background:#534AB7;color:#EEEDFE;border:none;border-radius:var(--border-radius-md);padding:10px 22px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:0.01em;}
.btn-start:hover{background:#3C3489;}
.panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:32px;width:100%;max-width:380px;}
.panel-eyebrow{font-size:12px;color:var(--color-text-secondary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
.panel-title{font-size:26px;font-weight:500;color:var(--color-text-primary);margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;}
.field input{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:14px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;font-family:inherit;}
.field input:focus{border-color:#534AB7;box-shadow:0 0 0 2px rgba(83,74,183,0.15);}
.forgot{font-size:12px;color:#534AB7;cursor:pointer;text-align:right;margin-top:6px;display:block;}
.btn-login{width:100%;background:#534AB7;color:#EEEDFE;border:none;border-radius:var(--border-radius-md);padding:11px;font-size:14px;font-weight:500;cursor:pointer;margin-top:20px;}
.btn-login:hover{background:#3C3489;}
.out-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:48px 32px;width:100%;max-width:380px;text-align:center;}
.out-icon{width:48px;height:48px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.out-icon svg{width:22px;height:22px;}
.out-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;}
.out-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:28px;line-height:1.5;}
.btn-back{background:#534AB7;color:#EEEDFE;border:none;border-radius:var(--border-radius-md);padding:10px 22px;font-size:14px;font-weight:500;cursor:pointer;}
.btn-back:hover{background:#3C3489;}
</style>

<div class="root" id="app-root">
  <div class="topbar" id="logo" onclick="show('cover')" role="button" tabindex="0" aria-label="Go to home">
    <div class="mark">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="3,8 6.5,11.5 13,4.5" stroke="#EEEDFE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="wordmark">AppName</span>
  </div>

  <div class="screen active" id="cover">
    <div class="cover-inner" style="width:100%;max-width:520px;">
      <p class="cover-eyebrow">Free template</p>
      <h1 class="cover-title">App onboarding<br>screens</h1>
      <button class="btn-start" id="btn-get-started" onclick="show('login')">Get started</button>
    </div>
  </div>

  <div class="screen" id="login">
    <div class="panel">
      <p class="panel-eyebrow">Welcome back</p>
      <h2 class="panel-title">Log in</h2>
      <div class="field">
        <label for="input-username">Username or email</label>
        <input id="input-username" name="username" type="text" placeholder="you@example.com" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="input-password">Password</label>
        <input id="input-password" name="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        <span class="forgot" role="button" tabindex="0">Forgot password?</span>
      </div>
      <button class="btn-login" id="btn-login" onclick="show('logout')">Continue</button>
    </div>
  </div>

  <div class="screen" id="logout">
    <div class="out-panel">
      <div class="out-icon">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 3H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h4" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round"/>
          <polyline points="14,15 18,11 14,7" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="18" y1="11" x2="9" y2="11" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="out-title">You've been logged out</p>
      <p class="out-sub">Your session has ended. Log back in to continue.</p>
      <button class="btn-back" id="btn-login-again" onclick="show('cover')">Back to login</button>
    </div>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
document.getElementById('logo').addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' ')show('cover');});
</script>
