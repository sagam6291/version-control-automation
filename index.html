
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .outer { background: #d4d4d4; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; }

  #cover {
    background: #d9d9d9;
    border-radius: 18px;
    min-height: clamp(320px, 55vw, 500px);
    flex-direction: column;
    justify-content: center;
    padding: clamp(32px, 6vw, 70px) clamp(28px, 6vw, 64px);
  }
  .cover-title {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 700;
    color: #0a0a0a;
    line-height: 1.1;
    margin-bottom: clamp(28px, 4vw, 52px);
  }
  .btn-get-started {
    background: #2d2b7a !important;
    color: #fff !important;
    border: none;
    border-radius: 10px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    width: fit-content;
  }
  .btn-get-started:hover { background: #23216b !important; }

  #login { align-items: center; justify-content: center; }
  .card-wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; width: 100%; }
  .card {
    background: #f5f5f5;
    border-radius: 20px;
    padding: clamp(24px, 5vw, 44px) clamp(22px, 5vw, 48px) clamp(28px, 5vw, 48px);
    width: 100%;
    max-width: 440px;
  }
  .welcome-label { font-size: clamp(13px, 1.8vw, 16px); color: #222; font-weight: 400; display: block; margin-bottom: 4px; }
  .card-title { font-size: clamp(28px, 5vw, 42px); font-weight: 700; color: #0a0a0a; margin-bottom: clamp(20px, 3vw, 32px); margin-top: 2px; }

  .field-group { margin-bottom: clamp(14px, 2.5vw, 20px); }
  .field-label { font-size: clamp(12px, 1.5vw, 14px); color: #333; margin-bottom: 6px; display: block; }
  .field-input {
    width: 100%;
    border: 1.5px solid #93b8f0;
    border-radius: 10px;
    padding: clamp(10px, 1.8vw, 14px) clamp(12px, 2vw, 16px);
    font-size: clamp(13px, 1.5vw, 15px);
    background: #fff;
    color: #333;
    outline: none;
  }
  .field-input:focus { border-color: #5a8fe0; }
  .field-input.no-border { border: 1.5px solid #e0e0e0; }
  .field-input.no-border:focus { border-color: #93b8f0; }

  .forgot-row { text-align: right; margin-top: 6px; }
  .forgot-link { color: #5a8fe0; font-size: clamp(11px, 1.3vw, 13px); cursor: pointer; }

  .btn-primary {
    width: 100%;
    background: #6b8f2a !important;
    color: #fff !important;
    border: none;
    border-radius: 10px;
    padding: clamp(12px, 2vw, 15px);
    font-size: clamp(14px, 1.8vw, 16px);
    font-weight: 500;
    cursor: pointer;
    margin-top: clamp(18px, 3vw, 28px);
  }
  .btn-primary:hover { background: #5a7a22 !important; }

  #logout { align-items: center; justify-content: center; }
  .logout-card {
    background: #f0f0f8;
    border-radius: 16px;
    width: 100%;
    max-width: 440px;
    min-height: clamp(320px, 55vw, 520px);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .spiral-bg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .logout-content { position: relative; z-index: 2; text-align: center; padding: 20px; }
  .logout-text { font-size: clamp(16px, 2.5vw, 22px); font-weight: 700; color: #111; margin-bottom: 16px; }
  .btn-login-again {
    background: #111 !important;
    color: #fff !important;
    border: none;
    border-radius: 8px;
    padding: clamp(10px, 1.5vw, 13px) clamp(20px, 3vw, 30px);
    font-size: clamp(13px, 1.6vw, 15px);
    font-weight: 500;
    cursor: pointer;
  }
  .btn-login-again:hover { background: #2a2a2a !important; }
</style>

<div class="outer" id="app-root" data-testid="app-root">

  <!-- Cover -->
  <div class="screen active" id="cover" data-testid="screen-cover">
    <div class="cover-title">Free App<br>Onboarding<br>Screens</div>
    <button
      id="btn-get-started"
      data-testid="btn-get-started"
      class="btn-get-started"
      onclick="show('login')"
    >Get started</button>
  </div>

  <!-- Login -->
  <div class="screen" id="login" data-testid="screen-login">
    <div class="card-wrap" style="background:#d4d4d4;">
      <div class="card">
        <span class="welcome-label">Welcome</span>
        <div class="card-title">login</div>

        <div class="field-group">
          <label class="field-label" for="input-username">Enter your username or email address</label>
          <input
            id="input-username"
            data-testid="input-username"
            class="field-input"
            type="text"
            placeholder="Username or email address"
            name="username"
            autocomplete="username"
          />
        </div>
        <div class="field-group">
          <label class="field-label" for="input-password">Enter your Password</label>
          <input
            id="input-password"
            data-testid="input-password"
            class="field-input no-border"
            type="password"
            placeholder="Password"
            name="password"
            autocomplete="current-password"
          />
          <div class="forgot-row">
            <span
              id="link-forgot-password"
              data-testid="link-forgot-password"
              class="forgot-link"
              role="button"
              tabindex="0"
            >Forgot Password</span>
          </div>
        </div>

        <button
          id="btn-login-submit"
          data-testid="btn-login-submit"
          class="btn-primary"
          onclick="show('logout')"
        >login</button>
      </div>
    </div>
  </div>

  <!-- Logout -->
  <div class="screen" id="logout" data-testid="screen-logout">
    <div class="card-wrap" style="background:#d4d4d4;">
      <div class="logout-card">
        <svg class="spiral-bg" viewBox="0 0 440 520" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <rect width="440" height="520" fill="#f0f0f8"/>
          <g fill="none" stroke="#6677cc" stroke-width="0.7" opacity="0.45">
            <rect x="8" y="8" width="424" height="504" rx="2"/>
            <rect x="28" y="28" width="384" height="464" rx="2" transform="rotate(3.5 220 260)"/>
            <rect x="48" y="48" width="344" height="424" rx="2" transform="rotate(7 220 260)"/>
            <rect x="68" y="68" width="304" height="384" rx="2" transform="rotate(10.5 220 260)"/>
            <rect x="88" y="88" width="264" height="344" rx="2" transform="rotate(14 220 260)"/>
            <rect x="108" y="108" width="224" height="304" rx="2" transform="rotate(17.5 220 260)"/>
            <rect x="128" y="128" width="184" height="264" rx="2" transform="rotate(21 220 260)"/>
            <rect x="148" y="148" width="144" height="224" rx="2" transform="rotate(24.5 220 260)"/>
            <rect x="168" y="168" width="104" height="184" rx="2" transform="rotate(28 220 260)"/>
            <rect x="188" y="188" width="64" height="144" rx="2" transform="rotate(31.5 220 260)"/>
            <rect x="208" y="208" width="24" height="104" rx="2" transform="rotate(35 220 260)"/>
          </g>
          <g fill="none" stroke="#4499bb" stroke-width="0.5" opacity="0.3">
            <rect x="18" y="18" width="404" height="484" rx="2" transform="rotate(-3 220 260)"/>
            <rect x="38" y="38" width="364" height="444" rx="2" transform="rotate(-6 220 260)"/>
            <rect x="58" y="58" width="324" height="404" rx="2" transform="rotate(-9 220 260)"/>
            <rect x="78" y="78" width="284" height="364" rx="2" transform="rotate(-12 220 260)"/>
            <rect x="98" y="98" width="244" height="324" rx="2" transform="rotate(-15 220 260)"/>
            <rect x="118" y="118" width="204" height="284" rx="2" transform="rotate(-18 220 260)"/>
            <rect x="138" y="138" width="164" height="244" rx="2" transform="rotate(-21 220 260)"/>
            <rect x="158" y="158" width="124" height="204" rx="2" transform="rotate(-24 220 260)"/>
            <rect x="178" y="178" width="84" height="164" rx="2" transform="rotate(-27 220 260)"/>
            <rect x="198" y="198" width="44" height="124" rx="2" transform="rotate(-30 220 260)"/>
          </g>
        </svg>
        <div class="logout-content">
          <div
            id="text-logged-out"
            data-testid="text-logged-out"
            class="logout-text"
          >You are logged out</div>
          <button
            id="btn-login-again"
            data-testid="btn-login-again"
            class="btn-login-again"
            onclick="show('cover')"
          >Login back again</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
