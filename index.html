
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .outer { background: #d4d4d4; min-height: 580px; display: flex; align-items: center; justify-content: center; padding: 32px; }
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; }

  #cover { background: #d9d9d9; border-radius: 18px; min-height: 420px; align-items: flex-start; padding: 60px 56px; flex-direction: column; justify-content: center; }
  .cover-title { font-size: 48px; font-weight: 700; color: #0a0a0a; line-height: 1.1; margin-bottom: 48px; }
  .btn-get-started { background: #2d2b7a !important; color: #fff !important; border: none; border-radius: 14px; padding: 16px 36px; font-size: 16px; font-weight: 500; cursor: pointer; }
  .btn-get-started:hover { background: #23216b !important; }

  .card-wrap { min-height: 580px; display: flex; align-items: center; justify-content: center; width: 100%; }
  .card-wrap.signin-bg { background: #d4d4d4; }
  .card-wrap.signup-bg { background: #1a1a2e; }
  .card { background: #f5f5f5; border-radius: 20px; padding: 36px 40px 40px; width: 100%; max-width: 420px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .welcome-label { font-size: 15px; color: #222; font-weight: 400; }
  .nav-link { font-size: 13px; color: #6b8f2a; cursor: pointer; text-align: right; text-decoration: none; display: inline-block; line-height: 1.5; }
  .nav-link:hover { text-decoration: underline; }
  .card-title { font-size: 38px; font-weight: 700; color: #0a0a0a; margin-bottom: 24px; margin-top: 2px; }

  .field-group { margin-bottom: 18px; }
  .field-label { font-size: 13px; color: #333; margin-bottom: 6px; display: block; }
  .field-input { width: 100%; border: 1.5px solid #93b8f0; border-radius: 10px; padding: 12px 14px; font-size: 14px; background: #fff; color: #333; outline: none; }
  .field-input:focus { border-color: #5a8fe0; }
  .field-input.no-border { border: 1.5px solid #e0e0e0; }
  .field-input.no-border:focus { border-color: #93b8f0; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .two-col-labels { display: flex; justify-content: space-between; margin-top: 6px; }

  .forgot-row { text-align: right; margin-top: 6px; }
  .forgot-link { color: #5a8fe0; font-size: 13px; cursor: pointer; }

  .btn-primary { width: 100%; background: #6b8f2a !important; color: #fff !important; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 24px; }
  .btn-primary:hover { background: #5a7a22 !important; }

  .logout-card { background: #f5f5ff; border-radius: 16px; width: 100%; max-width: 420px; min-height: 400px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .spiral-bg { position: absolute; inset: 0; }
  .logout-content { position: relative; z-index: 2; text-align: center; }
  .logout-text { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 16px; }
  .btn-login-again { background: #111 !important; color: #fff !important; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .btn-login-again:hover { background: #222 !important; }
</style>

<div class="outer">

  <!-- Cover -->
  <div class="screen active" id="cover">
    <div class="cover-title">Free App<br>Onboarding<br>Screens</div>
    <button class="btn-get-started" onclick="show('signin')">Get started</button>
  </div>

  <!-- Sign In -->
  <div class="screen" id="signin">
    <div class="card-wrap signin-bg">
      <div class="card">
        <div class="card-header">
          <span class="welcome-label">Welcome</span>
          <span class="nav-link" onclick="show('signup')">No Account ? Sign up</span>
        </div>
        <div class="card-title">Sign in</div>

        <div class="field-group">
          <label class="field-label">Enter your username or email address</label>
          <input class="field-input" type="text" placeholder="Username or email address" />
        </div>
        <div class="field-group">
          <label class="field-label">Enter your Password</label>
          <input class="field-input no-border" type="password" placeholder="Password" />
          <div class="forgot-row"><span class="forgot-link">Forgot Password</span></div>
        </div>

        <button class="btn-primary" onclick="show('logout')">Sign in</button>
      </div>
    </div>
  </div>

  <!-- Sign Up -->
  <div class="screen" id="signup">
    <div class="card-wrap signup-bg">
      <div class="card">
        <div class="card-header">
          <span class="welcome-label">Welcome</span>
          <span class="nav-link" onclick="show('signin')">Have an Account ? Sign in</span>
        </div>
        <div class="card-title">Sign up</div>

        <div class="field-group">
          <label class="field-label">Enter your username or email address</label>
          <input class="field-input" type="text" placeholder="Username or email address" />
        </div>
        <div class="field-group">
          <div class="two-col">
            <input class="field-input no-border" type="text" placeholder="User name" />
            <input class="field-input no-border" type="text" placeholder="Contact Number" />
          </div>
          <div class="two-col-labels">
            <span class="field-label" style="margin:0">User name</span>
            <span class="field-label" style="margin:0">Contact Number</span>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Enter your Password</label>
          <input class="field-input no-border" type="password" placeholder="Password" />
        </div>

        <button class="btn-primary" onclick="show('logout')">Sign up</button>
      </div>
    </div>
  </div>

  <!-- Logout -->
  <div class="screen" id="logout">
    <div class="card-wrap signin-bg">
      <div class="logout-card">
        <svg class="spiral-bg" viewBox="0 0 420 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <rect width="420" height="500" fill="#f5f5ff"/>
          <g fill="none" stroke="#7b8cde" stroke-width="0.6" opacity="0.5">
            <rect x="10" y="10" width="400" height="480" rx="2"/>
            <rect x="30" y="30" width="360" height="440" rx="2" transform="rotate(3 210 250)"/>
            <rect x="50" y="50" width="320" height="400" rx="2" transform="rotate(6 210 250)"/>
            <rect x="70" y="70" width="280" height="360" rx="2" transform="rotate(9 210 250)"/>
            <rect x="90" y="90" width="240" height="320" rx="2" transform="rotate(12 210 250)"/>
            <rect x="110" y="110" width="200" height="280" rx="2" transform="rotate(15 210 250)"/>
            <rect x="130" y="130" width="160" height="240" rx="2" transform="rotate(18 210 250)"/>
            <rect x="150" y="150" width="120" height="200" rx="2" transform="rotate(21 210 250)"/>
            <rect x="170" y="170" width="80" height="160" rx="2" transform="rotate(24 210 250)"/>
            <rect x="190" y="190" width="40" height="120" rx="2" transform="rotate(27 210 250)"/>
          </g>
          <g fill="none" stroke="#5566cc" stroke-width="0.4" opacity="0.35">
            <rect x="20" y="20" width="380" height="460" rx="2" transform="rotate(-2 210 250)"/>
            <rect x="40" y="40" width="340" height="420" rx="2" transform="rotate(-4 210 250)"/>
            <rect x="60" y="60" width="300" height="380" rx="2" transform="rotate(-6 210 250)"/>
            <rect x="80" y="80" width="260" height="340" rx="2" transform="rotate(-8 210 250)"/>
            <rect x="100" y="100" width="220" height="300" rx="2" transform="rotate(-10 210 250)"/>
            <rect x="120" y="120" width="180" height="260" rx="2" transform="rotate(-12 210 250)"/>
            <rect x="140" y="140" width="140" height="220" rx="2" transform="rotate(-14 210 250)"/>
            <rect x="160" y="160" width="100" height="180" rx="2" transform="rotate(-16 210 250)"/>
            <rect x="180" y="180" width="60" height="140" rx="2" transform="rotate(-18 210 250)"/>
          </g>
        </svg>
        <div class="logout-content">
          <div class="logout-text">You are logged out</div>
          <button class="btn-login-again" onclick="show('cover')">Login back again</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
